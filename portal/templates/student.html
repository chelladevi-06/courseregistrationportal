<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
    padding:40px 20px;
    color:white;
}

.container{
    width:95%;
    max-width:1400px;
    margin:auto;
}

.page-header{
    text-align:center;
    margin-bottom:35px;
}

.page-header h1{
    font-size:42px;
    font-weight:700;
    margin-bottom:10px;
}

.page-header p{
    color:#94a3b8;
    font-size:16px;
}

.prediction-form{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:25px;
    padding:35px;
    box-shadow:0 8px 30px rgba(0,0,0,0.4);
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:22px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group label{
    margin-bottom:8px;
    font-size:14px;
    color:#cbd5e1;
    font-weight:600;
}

.form-group input,
.form-group select{
    background:#1e293b;
    color:white;
    border:1px solid #334155;
    border-radius:12px;
    padding:12px 15px;
    font-size:15px;
    transition:0.3s;
}

.form-group input:focus,
.form-group select:focus{
    outline:none;
    border-color:#3b82f6;
    box-shadow:0 0 15px rgba(59,130,246,0.4);
}

.predict-btn{
    width:100%;
    margin-top:30px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.predict-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(124,58,237,0.4);
}

.result-box{
    margin-top:25px;
    padding:20px;
    border-radius:15px;
    background:rgba(16,185,129,0.15);
    border-left:6px solid #10b981;
}

.result-box h3{
    color:#6ee7b7;
    font-size:28px;
}

.dashboard-cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    padding:20px;
    border-radius:20px;
    text-align:center;
    border:1px solid rgba(255,255,255,0.08);
}

.card h2{
    font-size:28px;
    color:#60a5fa;
    margin-bottom:8px;
}

.card p{
    color:#cbd5e1;
}

@media(max-width:1100px){

    .form-grid{
        grid-template-columns:repeat(2,1fr);
    }

    .dashboard-cards{
        grid-template-columns:repeat(2,1fr);
    }

}

@media(max-width:768px){

    .form-grid{
        grid-template-columns:1fr;
    }

    .dashboard-cards{
        grid-template-columns:1fr;
    }

    .page-header h1{
        font-size:30px;
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="page-header">
        <h1>🎓 Student Dashboard</h1>
        <p>Course Registration & Dropout Prediction System</p>
    </div>

    

    <form method="POST" action="{% url 'student' %}" class="prediction-form">
    {% csrf_token %}

        <div class="form-grid">

            <div class="form-group">
                <label>Student Name</label>
                <input type="text" name="student_name" required>
            </div>

            <div class="form-group">
                <label>Course Code</label>
                <input type="number" name="course_code" required>
            </div>

            <div class="form-group">
                <label>Previous Qualification Grade</label>
                <input type="number" step="0.01" name="previous_qualification_grade" required>
            </div>

            <div class="form-group">
                <label>Admission Grade</label>
                <input type="number" step="0.01" name="admission_grade" required>
            </div>

            <div class="form-group">
                <label>Tuition Fees Up To Date</label>
                <select name="tuition_fees_up_to_date">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Gender</label>
                <select name="gender">
                    <option value="1">Male</option>
                    <option value="0">Female</option>
                </select>
            </div>

            <div class="form-group">
                <label>Age At Enrollment</label>
                <input type="number" name="age_at_enrollment" required>
            </div>

            <div class="form-group">
                <label>Scholarship Holder</label>
                <select name="scholarship_holder">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Debtor</label>
                <select name="debtor">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="form-group">
                <label>1st Sem Enrolled Units</label>
                <input type="number" name="units_1st_sem_enrolled" required>
            </div>

            <div class="form-group">
                <label>1st Sem Approved Units</label>
                <input type="number" name="units_1st_sem_approved" required>
            </div>

            <div class="form-group">
                <label>1st Sem Grade</label>
                <input type="number" step="0.01" name="units_1st_sem_grade" required>
            </div>

            <div class="form-group">
                <label>2nd Sem Enrolled Units</label>
                <input type="number" name="units_2nd_sem_enrolled" required>
            </div>

            <div class="form-group">
                <label>2nd Sem Approved Units</label>
                <input type="number" name="units_2nd_sem_approved" required>
            </div>

            <div class="form-group">
                <label>2nd Sem Grade</label>
                <input type="number" step="0.01" name="units_2nd_sem_grade" required>
            </div>

            <div class="form-group">
                <label>Withdrawal Rate</label>
                <input type="number" step="0.01" name="withdrawal_rate" required>
            </div>

            <div class="form-group">
                <label>GPA Trend</label>
                <input type="number" step="0.01" name="gpa_trend" required>
            </div>

            <div class="form-group">
                <label>Approval Ratio</label>
                <input type="number" step="0.01" name="approval_ratio" required>
            </div>

            <div class="form-group">
                <label>Attendance Rate</label>
                <input type="number" step="0.01" name="attendance_rate" required>
            </div>

            <div class="form-group">
                <label>Engagement Score</label>
                <input type="number" step="0.01" name="engagement_score" required>
            </div>

        </div>

        <button type="submit" class="predict-btn">
            Predict Dropout Risk
        </button>
        {% if message %}
<p>{{ message }}</p>
{% endif %}

    </form>

</div>

</body>
</html>
