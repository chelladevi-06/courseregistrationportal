<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    
</head>
<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI',sans-serif;
    }

    body{
        background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
        color:#f8fafc;
        min-height:100vh;
    }

    .container{
        width:95%;
        max-width:1400px;
        margin:auto;
        padding:30px;
    }

    h1{
        text-align:center;
        color:#ffffff;
        margin-bottom:25px;
        font-size:40px;
    }

    table{
        width:100%;
        border-collapse:collapse;
        background:rgba(255,255,255,0.05);
        backdrop-filter:blur(12px);
        border-radius:15px;
        overflow:hidden;
        box-shadow:0 8px 25px rgba(0,0,0,0.4);
    }

    table th{
        background:#2563eb;
        color:white;
        padding:15px;
        font-size:15px;
    }

    table td{
        padding:15px;
        text-align:center;
        color:#e2e8f0;
        border-bottom:1px solid rgba(255,255,255,0.08);
    }

    table tr:hover{
        background:rgba(255,255,255,0.05);
    }

    button{
        background:linear-gradient(135deg,#2563eb,#7c3aed);
        color:white;
        border:none;
        padding:10px 18px;
        border-radius:10px;
        cursor:pointer;
        font-weight:600;
        transition:.3s;
    }

    button:hover{
        transform:translateY(-2px);
        box-shadow:0 5px 15px rgba(124,58,237,0.4);
    }

    .details-grid{
        display:grid;
        grid-template-columns:repeat(3,1fr);
        gap:20px;
        margin-top:20px;
    }

    .box{
        background:rgba(255,255,255,0.08);
        padding:18px;
        border-radius:12px;
        border:1px solid rgba(255,255,255,0.08);
        color:#f8fafc;
    }

    .prediction{
        background:rgba(16,185,129,0.15);
        border-left:5px solid #10b981;
        color:#6ee7b7;
        font-weight:600;
    }

    @media(max-width:992px){

        .details-grid{
            grid-template-columns:repeat(2,1fr);
        }

    }

    @media(max-width:768px){

        .details-grid{
            grid-template-columns:1fr;
        }

        table{
            display:block;
            overflow-x:auto;
        }

        h1{
            font-size:28px;
        }

    }

    </style>

</head>

<body>


<div class="container">

    <h1>Student Dropout Risk Dashboard</h1>

<form method="POST" action="{% url 'admin_dashboard' %}" class="prediction-form">
{% csrf_token %}

<div class="details-grid">

<div class="box">
<label>Student Name</label>
<input type="text" name="student_name" required>
</div>

<div class="box">
<label>Course Code</label>
<input type="number" name="course_code" required>
</div>

<div class="box">
<label>Previous Qualification Grade</label>
<input type="number" step="0.01" name="previous_qualification_grade" required>
</div>

<div class="box">
<label>Admission Grade</label>
<input type="number" step="0.01" name="admission_grade" required>
</div>

<div class="box">
<label>Tuition Fees Up To Date</label>
<select name="tuition_fees_up_to_date">
<option value="1">Yes</option>
<option value="0">No</option>
</select>
</div>

<div class="box">
<label>Gender</label>
<select name="gender">
<option value="1">Male</option>
<option value="0">Female</option>
</select>
</div>

<div class="box">
<label>Age At Enrollment</label>
<input type="number" name="age_at_enrollment" required>
</div>

<div class="box">
<label>Scholarship Holder</label>
<select name="scholarship_holder">
<option value="1">Yes</option>
<option value="0">No</option>
</select>
</div>

<div class="box">
<label>Debtor</label>
<select name="debtor">
<option value="1">Yes</option>
<option value="0">No</option>
</select>
</div>

<div class="box">
<label>1st Sem Enrolled Units</label>
<input type="number" name="units_1st_sem_enrolled" required>
</div>

<div class="box">
<label>1st Sem Approved Units</label>
<input type="number" name="units_1st_sem_approved" required>
</div>

<div class="box">
<label>1st Sem Grade</label>
<input type="number" step="0.01" name="units_1st_sem_grade" required>
</div>

<div class="box">
<label>2nd Sem Enrolled Units</label>
<input type="number" name="units_2nd_sem_enrolled" required>
</div>

<div class="box">
<label>2nd Sem Approved Units</label>
<input type="number" name="units_2nd_sem_approved" required>
</div>

<div class="box">
<label>2nd Sem Grade</label>
<input type="number" step="0.01" name="units_2nd_sem_grade" required>
</div>

<div class="box">
<label>Withdrawal Rate</label>
<input type="number" step="0.01" name="withdrawal_rate" required>
</div>

<div class="box">
<label>GPA Trend</label>
<input type="number" step="0.01" name="gpa_trend" required>
</div>

<div class="box">
<label>Approval Ratio</label>
<input type="number" step="0.01" name="approval_ratio" required>
</div>

<div class="box">
<label>Attendance Rate</label>
<input type="number" step="0.01" name="attendance_rate" required>
</div>

<div class="box">
<label>Engagement Score</label>
<input type="number" step="0.01" name="engagement_score" required>
</div>

</div>

<br>

<button type="submit">
Predict 
</button>

</form>

<br>
{% if prediction %}
<div class="result-box">
    <h3>Prediction: {{ prediction }}</h3>
</div>
{% endif %}
<table>
<tr>
    <th>Student Name</th>
    <th>Course Code</th>
    <th>Attendance Rate</th>
    <th>Prediction</th>
</tr>

{% for s in students %}
<tr>
    <td>{{ s.student_name }}</td>
    <td>{{ s.course_code }}</td>
    <td>{{ s.attendance_rate }}</td>
    <td>{{ s.prediction }}</td>
</tr>
{% endfor %}
</table>
   
<script>
function toggleDetails(id){
    let row = document.getElementById("details" + id);

    if(row.style.display === "none"){
        row.style.display = "table-row";
    }else{
        row.style.display = "none";
    }
}
</script>

</body>
</html>
